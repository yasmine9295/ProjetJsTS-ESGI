<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBourse</title>
    <script src="./src/main.ts" type="module"></script>
</head>
<body style="display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 1rem;">

    <h1>MyBourse - (Charts ca m'a donné mal à la tete)</h1>
    <button id="btnsombre" style="position: fixed; right: 1rem;">Mode sombre</button>
    <button id="exportBtn"style="position: fixed; right: 8rem;">Exporter CSV</button>

    <select id="name1"></select>
    <select id="name2"></select>

    <select id="typeChart">
        <option value="line">Ligne</option>
        <option value="bar">Barres</option>
    </select>

    <!-- <button id="afficher">Afficher</button> -->

    <label for="periode">Période :</label>
    <select id="periode">
        <option value="all">Toutes</option>
        <option value="1jour">24h</option>
        <option value="semaine">1 semaine</option>
        <option value="mois">1 mois</option>
        <option value="an">1 an</option>
    </select>

    <div id="errorMessage" style="color: red"></div>
    <canvas id="lineCanvas" aria-label="chart"></canvas>

    
</body>
</html>



<style>
  body.dark {
    background-color: #1a1a1a;
    color: white;
  }
  body.dark select {
    background-color: #333;
    color: white;
  }
  body.dark #errorMessage {
    color: #ff6b6b;
  }

</style>
